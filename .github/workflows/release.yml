name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Read Version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Package Binaries
        run: |
          mkdir -p release-dist
          
          # Linux AMD64 (x86_64)
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags="-s -w" -o gophrdrv ./cmd/gophrdrv
          tar -czvf release-dist/gophrdrv-linux-amd64.tar.gz gophrdrv LICENSE
          rm gophrdrv
          
          # Linux i386 (x86 32-bit)
          CGO_ENABLED=0 GOOS=linux GOARCH=386 go build -trimpath -ldflags="-s -w" -o gophrdrv ./cmd/gophrdrv
          tar -czvf release-dist/gophrdrv-linux-i386.tar.gz gophrdrv LICENSE
          rm gophrdrv
          
          # Linux ARM64 (64-bit ARM)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -trimpath -ldflags="-s -w" -o gophrdrv ./cmd/gophrdrv
          tar -czvf release-dist/gophrdrv-linux-arm64.tar.gz gophrdrv LICENSE
          rm gophrdrv
          
          # Linux ARM32 (32-bit ARM v7)
          CGO_ENABLED=0 GOOS=linux GOARCH=arm GOARM=7 go build -trimpath -ldflags="-s -w" -o gophrdrv ./cmd/gophrdrv
          tar -czvf release-dist/gophrdrv-linux-arm32.tar.gz gophrdrv LICENSE
          rm gophrdrv

      - name: Generate Checksums
        run: |
          cd release-dist
          sha256sum gophrdrv-linux-*.tar.gz > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            release-dist/gophrdrv-linux-*.tar.gz
            release-dist/checksums.txt
          generate_release_notes: true
