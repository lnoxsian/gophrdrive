name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Read Version
        id: get_version
        run: |
          VERSION=$(cat VERSION | tr -d '\r\n')
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Build and Package Binaries
        run: |
          mkdir -p release-dist
          
          # Helper to build and package files for a specific architecture
          package_release() {
            local arch=$1
            local goarch=$2
            local goarm=${3:-""}
            
            echo "Building for linux/$goarch $goarm..."
            
            # Create a temporary directory to compile into (avoids filename collision)
            mkdir -p gophrdrv-temp
            
            if [ -n "$goarm" ]; then
              CGO_ENABLED=0 GOOS=linux GOARCH=$goarch GOARM=$goarm go build -trimpath -ldflags="-s -w" -o gophrdrv-temp/gophrdrv ./cmd/gophrdrv
            else
              CGO_ENABLED=0 GOOS=linux GOARCH=$goarch go build -trimpath -ldflags="-s -w" -o gophrdrv-temp/gophrdrv ./cmd/gophrdrv
            fi
            
            cp LICENSE gophrdrv-temp/
            cp scripts/install.sh gophrdrv-temp/
            
            # Rename the folder to target archive name
            mv gophrdrv-temp gophrdrv
            
            tar -czvf release-dist/gophrdrv-linux-$arch.tar.gz gophrdrv
            rm -rf gophrdrv
          }
          
          package_release "amd64" "amd64"
          package_release "i386" "386"
          package_release "arm64" "arm64"
          package_release "arm32" "arm" "7"

      - name: Generate Checksums
        run: |
          cd release-dist
          sha256sum gophrdrv-linux-*.tar.gz > checksums.txt

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          files: |
            release-dist/gophrdrv-linux-*.tar.gz
            release-dist/checksums.txt
          generate_release_notes: true
